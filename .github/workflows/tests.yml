name: Tests

on:
  - push
  - pull_request

jobs:
  lint:
    name: lint / 3.12
    runs-on: ubuntu-latest
    env:
      FORCE_COLOR: "1"
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.12"
          enable-cache: true
      - run: uv sync --all-groups --locked
      - name: Ruff lint
        run: uv run ruff check .
      - name: Ruff format check
        run: uv run ruff format --check .

  tests:
    name: tests / ${{ matrix.python }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ["3.12"]
    env:
      FORCE_COLOR: "1"
    steps:
      - uses: actions/checkout@v4

      - name: Start World Broker
        uses: namoshek/rabbitmq-github-action@v1
        with:
          version: "3.9.13"
          ports: "1885:1885 4369:4369 5672:5672 15672:15672 15674:15674 25672:25672"
          config: ${{ github.workspace }}/.ci/rabbitmq.conf
          container-name: "rabbit"

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          python-version: ${{ matrix.python }}
          enable-cache: true

      - run: uv sync --all-groups --locked

      - name: Run tests
        run: uv run coverage run --parallel -m pytest

      - name: Coverage report
        run: |
          uv run coverage combine
          uv run coverage report
