repos:
  - repo: local
    hooks:
      - id: check-added-large-files
        name: Check for added large files
        entry: check-added-large-files
        language: system
      - id: check-toml
        name: Check Toml
        entry: check-toml
        language: system
        types: [toml]
      - id: check-yaml
        name: Check Yaml
        entry: check-yaml
        language: system
        types: [yaml]
      - id: end-of-file-fixer
        name: Fix End of Files
        entry: end-of-file-fixer
        language: system
        types: [text]
        stages: [commit, push, manual]
        exclude: "CodeGenerationTools/.*|rabbit/.*"
      - id: pyupgrade
        name: pyupgrade
        description: Automatically upgrade syntax for newer versions.
        entry: pyupgrade
        language: system
        types: [python]
        args: [--py312-plus]
      - id: trailing-whitespace
        name: Trim Trailing Whitespace
        entry: trailing-whitespace-fixer
        language: system
        types: [text]
        stages: [commit, push, manual]
        exclude: "CodeGenerationTools/.*|rabbit/.*"
      - id: rabbit-definitions-drift
        name: Rabbit definitions in sync with topology
        entry: uv run python for_docker/gen_definitions.py --check
        language: system
        pass_filenames: false
        files: "^(src/gwbase/topology\\.py|src/gwbase/rabbit_definitions\\.py|rabbit/rabbitconfig/.*_definitions\\.json)$"
      # Full CI mirror (lint + drift + tests). Pre-push only, and only active
      # after `pre-commit install --hook-type pre-push`. Needs a dev broker up
      # (./arm.sh); bypass with `git push --no-verify`.
      - id: ci
        name: Full CI (ci.sh)
        entry: ./ci.sh
        language: system
        pass_filenames: false
        always_run: true
        stages: [push]
  - repo: https://github.com/astral-sh/ruff-pre-commit
    # Ruff version — keep in step with the ruff dev dependency (uv.lock);
    # an older pin cannot parse newer rule selectors in pyproject.toml.
    rev: v0.15.14
    hooks:
      - id: ruff
        args: ["--select", "I"]
      - id: ruff-format
