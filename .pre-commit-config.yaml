repos:
  # Standard hooks — repo-based so pre-commit installs them in its own isolated
  # envs. No dependence on the project venv being on PATH (the cause of the
  # "Executable not found" failures with the old `language: system` form).
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-added-large-files
      - id: check-toml
      - id: check-yaml
      - id: end-of-file-fixer
        exclude: "CodeGenerationTools/.*|rabbit/.*"
      - id: trailing-whitespace
        exclude: "CodeGenerationTools/.*|rabbit/.*"
  - repo: https://github.com/asottile/pyupgrade
    rev: v3.19.1
    hooks:
      - id: pyupgrade
        args: [--py312-plus]
  # Project-specific hooks that need the gwbase env (run via `uv run`).
  - repo: local
    hooks:
      - id: rabbit-definitions-drift
        name: Rabbit definitions in sync with topology
        entry: uv run python for_docker/gen_definitions.py --check
        language: system
        pass_filenames: false
        files: "^(src/gwbase/topology\\.py|src/gwbase/rabbit_definitions\\.py|rabbit/rabbitconfig/.*_definitions\\.json)$"
      # Full CI mirror (lint + drift + tests). Pre-push only, and only active
      # after `pre-commit install --hook-type pre-push`. Needs a dev broker up
      # (./arm.sh); bypass with `git push --no-verify`.
      - id: ci
        name: Full CI (ci.sh)
        entry: ./ci.sh
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-push]
  - repo: https://github.com/astral-sh/ruff-pre-commit
    # Ruff version — keep in step with the ruff dev dependency (uv.lock);
    # an older pin cannot parse newer rule selectors in pyproject.toml.
    rev: v0.15.14
    hooks:
      - id: ruff
        args: ["--select", "I"]
      - id: ruff-format
