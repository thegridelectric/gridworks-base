## Networking
listeners.tcp.default = 5672

loopback_users = none

## Identity + topology come from the generated definitions file (vhost,
## smqPublic user, permissions, exchanges, bindings) — NOT from default_*
## lines, which would race the definitions import. The file is generated
## from gwbase.topology (see wiki executor spec §3.6).
definitions.import_backend = local_filesystem
definitions.local.path = /etc/rabbitmq/definitions.json

## Clustering
cluster_partition_handling = ignore
## Set a limit relative to total available RAM
## NOTE: this 1 stands for GB. The default is 50 MB.
## When we set it to 1.0 with a naive implementation on EC2
## The disk  filled up after a while. Come back and think about
## how to make an instance and if we want this again.
# disk_free_limit.relative = 1.0
## Management
management.tcp.port = 15672
management.tcp.ip = 0.0.0.0

## Logging
log.file.level = debug


# Reg no TLS port is 1883; using 1885 in case dev machine has an mqtt broker on 1883
mqtt.listeners.tcp.default = 1885
## Default MQTT with TLS port is 8883
# mqtt.listeners.ssl.default = 8883

# Anonymous connections (dev convenience) map to smqPublic. RabbitMQ 4.x
# removed mqtt.default_user / mqtt.default_pass / mqtt.allow_anonymous;
# anonymous identity is now the global anonymous_login_user/pass.
anonymous_login_user = smqPublic
anonymous_login_pass = smqPublic

mqtt.vhost            = d1__1
mqtt.exchange         = amq.topic
# 24 hours (RabbitMQ 3.13+ replaced mqtt.subscription_ttl (ms) with this)
mqtt.max_session_expiry_interval_seconds = 86400
mqtt.prefetch         = 10
