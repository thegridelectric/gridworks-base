$schema: "https://json-schema.org/draft/2020-12/schema"
$id: "https://schemas.electricity.works/types/sim.ready/000"

title: "sim.ready"
type: object
description: >
  Actor readiness announcement for coordinated simulation time. This message is
  sent to a TimeCoordinator by an actor whose simulated behavior is required
  before simulation time may advance. Not all actors are expected to send
  sim.ready messages; the TimeCoordinator determines which actors are awaited
  for a given simulation timestep. The message identifies the actor runtime
  instance and the simulation timestamp for which that actor is ready.

properties:
  FromGNodeAlias:
    $ref: "https://schemas.electricity.works/formats/left.right.dot"
    description: >
      GNode alias of the actor sending the readiness announcement.

  FromGNodeInstanceId:
    $ref: "https://schemas.electricity.works/formats/uuid4.str"
    description: >
      Unique identifier of the specific actor runtime instance sending the
      readiness announcement.

  TimeUnixS:
    $ref: "https://schemas.electricity.works/formats/utc.seconds"
    description: >
      Simulated Unix time in seconds for which the actor is ready.

  TypeName:
    const: "sim.ready"

  Version:
    const: "000"

required:
  - FromGNodeAlias
  - FromGNodeInstanceId
  - TimeUnixS
  - TypeName
  - Version

additionalProperties: false

examples:
  - |
    {
      "FromGNodeAlias": "d1.actor",
      "FromGNodeInstanceId": "19ee09df-80ba-437b-b6c1-1eebe9d34801",
      "TimeUnixS": 1577854800,
      "TypeName": "sim.ready",
      "Version": "000"
    }

x-gridworks:
  owner: "gridworks-energy"
